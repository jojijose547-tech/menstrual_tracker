<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body {
    font-family: Arial;
    background: #f5f6fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
h2 { text-align: center; }
input, button {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}
button {
    background: #ff6b81;
    color: white;
    border: none;
    cursor: pointer;
}
a {
    text-decoration: none;
    color: #ff6b81;
}
</style>
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <form action="/login" method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="register.html">Register</a></p>
</div>

</body>
</html>
