<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CycleCare Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* Navbar */
nav {
    background: #ff6b81;
    padding: 15px;
    display: flex;
    justify-content: space-around;
    color: white;
}

nav div {
    cursor: pointer;
    font-weight: bold;
}

/* Sections */
.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

/* Cards */
.card {
    background: white;
    padding: 20px;
    margin: 15px 0;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.05);
}

input, select, button {
    display: block;
    margin: 10px 0;
    padding: 10px;
    width: 250px;
}

button {
    background: #ff6b81;
    color: white;
    border: none;
    cursor: pointer;
}

/* Added slight styling for the settings labels */
.card label {
    font-size: 14px;
    font-weight: bold;
    color: #555;
    margin-top: 10px;
    display: block;
}
</style>
</head>

<body>

<nav>
    <div onclick="showSection('cycle')">Cycle Entry</div>
    <div onclick="showSection('prediction')">Prediction</div>
    <div onclick="showSection('reminder')">Reminders</div>
    <div onclick="showSection('report')">Reports</div>
    <div onclick="showSection('settings')">Settings</div>
</nav>

<div id="cycle" class="section active">
    <div class="card">
        <h2>Menstrual Data Entry</h2>
        <input type="date" id="startDate">
        <input type="date" id="endDate">

        <select id="flow">
            <option>Light</option>
            <option>Medium</option>
            <option>Heavy</option>
        </select>

        <input type="text" id="mood" placeholder="Mood">
        <input type="text" id="notes" placeholder="Notes">

        <button onclick="saveCycle()">Save</button>
    </div>
</div>

<div id="prediction" class="section">
    <div class="card">
        <h2>Cycle Prediction</h2>
        <input type="date" id="lastPeriod">
        <input type="number" id="cycleLength" placeholder="Cycle Length">

        <button onclick="predict()">Predict</button>

        <p id="predictionResult"></p>
    </div>
</div>

<div id="reminder" class="section">
    <div class="card">
        <h2>Reminders</h2>
        <select id="reminderType">
            <option>Period</option>
            <option>Ovulation</option>
        </select>

        <input type="datetime-local" id="reminderDate">

        <button onclick="setReminder()">Set Reminder</button>
    </div>
</div>

<div id="report" class="section">
    <div class="card">
        <h2>Health Insights</h2>
        <button onclick="getReport()">Generate Report</button>
        <p id="reportResult"></p>
    </div>
</div>

<div id="settings" class="section">
    <div class="card">
        <h2>Settings & Profile</h2>
        
        <label>Display Name:</label>
        <input type="text" id="profileName" placeholder="Enter your name">
        
        <label>Profile Picture:</label>
        <div id="dpPreview" style="display: none; margin-bottom: 10px;">
            <img id="profileImage" src="" alt="DP" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid #ff6b81;">
        </div>
        <input type="file" id="profilePic" accept="image/*">
        
        <label>Overall Details (Bio):</label>
        <input type="text" id="profileDetails" placeholder="Tell us about yourself">

        <button onclick="saveSettings()">Save Profile</button>

        <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
        
        <button onclick="logout()" style="background: #6c757d;">Logout</button>
    </div>
</div>
<script>
// NAVIGATION
function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
}

// USER ID
const userId = localStorage.getItem("userId");

// ================= API FUNCTIONS =================

async function saveCycle() {
    const userId = localStorage.getItem("userId");

    if (!userId) {
        alert("User not logged in ❌");
        return;
    }

    try {
        const res = await fetch('/api/cycle', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: userId,
                startDate: document.getElementById("startDate").value,
                endDate: document.getElementById("endDate").value,
                flow: document.getElementById("flow").value,
                mood: document.getElementById("mood").value,
                notes: document.getElementById("notes").value
            })
        });

        if (!res.ok) {
            throw new Error(`Server error: ${res.status}`);
        }

        const data = await res.json();
        alert(data.message || "Saved successfully!");

    } catch (error) {
        console.error("Error saving cycle data:", error);
        alert("Failed to save data. Please check your connection or server.");
    }
}

// Prediction
async function predict() {
    const res = await fetch('/api/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            userId,
            lastPeriodDate: lastPeriod.value,
            cycleLength: cycleLength.value
        })
    });

    const data = await res.json();

    predictionResult.innerText =
        "Next Period: " + data.nextPeriod +
        " | Ovulation: " + data.ovulation;
}

// Reminder
async function setReminder() {
    await fetch('/api/reminder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            userId,
            type: reminderType.value,
            date: reminderDate.value
        })
    });

    alert("Reminder set 🔔");
}

// Report
async function getReport() {
    const res = await fetch('/api/report/' + userId);
    const data = await res.json();

    reportResult.innerText =
        "Avg Cycle: " + data.averageCycleLength +
        " | Status: " + data.status;
}

// Save Settings (Updated for File Upload)
async function saveSettings() {
    const userId = localStorage.getItem("userId");

    if (!userId) {
        alert("User not logged in ❌");
        return;
    }

    const formData = new FormData();
    formData.append("userId", userId);
    formData.append("name", document.getElementById("profileName").value);
    formData.append("details", document.getElementById("profileDetails").value);
    
    // Grab the actual file from the file input
    const fileInput = document.getElementById("profilePic");
    if (fileInput.files.length > 0) {
        // FIX APPLIED HERE: Added to grab the actual file object
        formData.append("profilePic", fileInput.files);
    }

    try {
        const res = await fetch('/api/settings', {
            method: 'POST',
            body: formData 
        });

        if (!res.ok) {
            throw new Error(`Server error: ${res.status}`);
        }

        const data = await res.json();
        alert(data.message || "Profile settings saved successfully!");

    } catch (error) {
        console.error("Error saving settings:", error);
        alert("Failed to save settings. Please check your connection or server.");
    }
}

// Logout
function logout() {
    localStorage.removeItem("userId");
    window.location.href = "/";
}

// Automatically load data when the dashboard opens
document.addEventListener("DOMContentLoaded", () => {
    if (localStorage.getItem("userId")) {
        loadSettings();
    }
});

// Function to fetch and display the user's saved settings
async function loadSettings() {
    const userId = localStorage.getItem("userId");
    if (!userId) return;

    try {
        const res = await fetch(`/api/settings/${userId}`);
        if (!res.ok) throw new Error("Failed to fetch settings");
        
        const data = await res.json();

        // Fill the inputs if data exists in the database
        if (data.Name) {
            document.getElementById("profileName").value = data.Name;
        }
        if (data.Overall_Details) {
            document.getElementById("profileDetails").value = data.Overall_Details;
        }
        
        // Show the profile picture if it exists
        if (data.Profile_Pic) {
            document.getElementById("profileImage").src = data.Profile_Pic;
            document.getElementById("dpPreview").style.display = "block";
        }

    } catch (error) {
        console.error("Error loading profile data:", error);
    }
}
</script>

</body>
</html>
