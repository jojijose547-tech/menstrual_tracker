<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CycleCare Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* Navbar */
nav {
    background: #ff6b81;
    padding: 15px;
    display: flex;
    justify-content: space-around;
    color: white;
}

nav div {
    cursor: pointer;
    font-weight: bold;
}

/* Sections */
.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

/* Cards */
.card {
    background: white;
    padding: 20px;
    margin: 15px 0;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.05);
}

input, select, button {
    display: block;
    margin: 10px 0;
    padding: 10px;
    width: 250px;
}

button {
    background: #ff6b81;
    color: white;
    border: none;
    cursor: pointer;
}

/* Added slight styling for the settings labels */
.card label {
    font-size: 14px;
    font-weight: bold;
    color: #555;
    margin-top: 10px;
    display: block;
}
.profile-card {
    max-width: 400px;
    margin: auto;
    text-align: center;
}

.profile-center {
    margin: 20px 0;
}

.profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid #ff6b81;
    object-fit: cover;
    display: block;
    margin: 0 auto 10px;
}

.upload-btn {
    display: inline-block;
    background: #ff6b81;
    color: white;
    padding: 8px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
}

.input-group {
    text-align: left;
    margin: 15px 0;
}

textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    resize: none;
}

.save-btn {
    width: 100%;
    background: #ff6b81;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
}

.logout-btn {
    width: 100%;
    background: #6c757d;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
}
</style>
</head>

<body>

<nav>
    <div onclick="showSection('cycle')">Cycle Entry</div>
    <div onclick="showSection('prediction')">Prediction</div>
    <div onclick="showSection('reminder')">Reminders</div>
    <div onclick="showSection('report')">Reports</div>
    <div onclick="showSection('settings')">Settings</div>
</nav>

<div id="cycle" class="section active">
    <div class="card">
        <h2>Menstrual Data Entry</h2>
        <input type="date" id="startDate">
        <input type="date" id="endDate">

        <select id="flow">
            <option>Light</option>
            <option>Medium</option>
            <option>Heavy</option>
        </select>

        <input type="text" id="mood" placeholder="Mood">
        <input type="text" id="notes" placeholder="Notes">

        <button onclick="saveCycle()">Save</button>
    </div>
</div>

<div id="prediction" class="section">
    <div class="card">
        <h2>Cycle Prediction</h2>
        <input type="date" id="lastPeriod">
        <input type="number" id="cycleLength" placeholder="Cycle Length">

        <button onclick="predict()">Predict</button>

        <p id="predictionResult"></p>
    </div>
</div>

<div id="reminder" class="section">
    <div class="card">
        <h2>Reminders</h2>
        <select id="reminderType">
            <option>Period</option>
            <option>Ovulation</option>
        </select>

        <input type="datetime-local" id="reminderDate">

        <button onclick="setReminder()">Set Reminder</button>
    </div>
</div>

<div id="report" class="section">
    <div class="card">
        <h2>Health Insights</h2>
        <button onclick="getReport()">Generate Report</button>
        <p id="reportResult"></p>
    </div>
</div>

<div id="settings" class="section">
    <div class="card profile-card">

        <h2>👤 Profile Settings</h2>

        <!-- Profile Image -->
        <div class="profile-center">
            <img id="profileImage" src="https://via.placeholder.com/100" class="profile-img">
            
            <label class="upload-btn">
                Change Photo
                <input type="file" id="profilePic" accept="image/*" hidden>
            </label>
        </div>

        <!-- Name -->
        <div class="input-group">
            <label>Display Name</label>
            <input type="text" id="profileName" placeholder="Enter your name">
        </div>

        <!-- Bio -->
        <div class="input-group">
            <label>About You</label>
            <textarea id="profileDetails" placeholder="Tell something about yourself"></textarea>
        </div>

        <!-- Buttons -->
        <button class="save-btn" onclick="saveSettings()">Save Profile</button>

        <button class="logout-btn" onclick="logout()">Logout</button>

    </div>
</div>
<script>
// NAVIGATION
function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
}

// USER ID
const userId = localStorage.getItem("userId");

// ================= API FUNCTIONS =================

async function saveCycle() {
    const userId = localStorage.getItem("userId");

    if (!userId) {
        alert("User not logged in ❌");
        return;
    }

    try {
        const res = await fetch('/api/cycle', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: userId,
                startDate: document.getElementById("startDate").value,
                endDate: document.getElementById("endDate").value,
                flow: document.getElementById("flow").value,
                mood: document.getElementById("mood").value,
                notes: document.getElementById("notes").value
            })
        });

        if (!res.ok) {
            throw new Error(`Server error: ${res.status}`);
        }

        const data = await res.json();
        alert(data.message || "Saved successfully!");

    } catch (error) {
        console.error("Error saving cycle data:", error);
        alert("Failed to save data. Please check your connection or server.");
    }
}

// Prediction
async function predict() {
    const res = await fetch('/api/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            userId,
            lastPeriodDate: lastPeriod.value,
            cycleLength: cycleLength.value
        })
    });

    const data = await res.json();

    predictionResult.innerText =
        "Next Period: " + data.nextPeriod +
        " | Ovulation: " + data.ovulation;
}

// Reminder
async function setReminder() {
    await fetch('/api/reminder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            userId,
            type: reminderType.value,
            date: reminderDate.value
        })
    });

    alert("Reminder set 🔔");
}

// Report
async function getReport() {
    const res = await fetch('/api/report/' + userId);
    const data = await res.json();

    reportResult.innerText =
        "Avg Cycle: " + data.averageCycleLength +
        " | Status: " + data.status;
}

// Save Settings (Updated for File Upload)
async function saveSettings() {
    const userId = localStorage.getItem("userId");

    if (!userId) {
        alert("User not logged in ❌");
        return;
    }

    const formData = new FormData();
    formData.append("userId", userId);
    formData.append("name", document.getElementById("profileName").value);
    formData.append("details", document.getElementById("profileDetails").value);
    
   // Grab the actual file from the file input
    const fileInput = document.getElementById("profilePic");
    if (fileInput.files.length > 0) {
        // ADD HERE!
      formData.append("profilePic", fileInput.files[0]);
    }
    try {
        const res = await fetch('/api/settings', {
            method: 'POST',
            body: formData 
        });

        if (!res.ok) {
            throw new Error(`Server error: ${res.status}`);
        }

        const data = await res.json();
        alert(data.message || "Profile settings saved successfully!");
        loadSettings();

    } catch (error) {
        console.error("Error saving settings:", error);
        alert("Failed to save settings. Please check your connection or server.");
    }
}

// Logout
function logout() {
    localStorage.removeItem("userId");
    window.location.href = "/";
}

// Automatically load data when the dashboard opens
document.addEventListener("DOMContentLoaded", () => {
    if (localStorage.getItem("userId")) {
        loadSettings();
    }
});

// Function to fetch and display the user's saved settings
async function loadSettings() {
    const userId = localStorage.getItem("userId");
    if (!userId) return;

    try {
        const res = await fetch(`/api/settings/${userId}`);
        if (!res.ok) throw new Error("Failed to fetch settings");
        
        const data = await res.json();

        // Fill the inputs if data exists in the database
        if (data.Name) {
            document.getElementById("profileName").value = data.Name;
        }
        if (data.Overall_Details) {
            document.getElementById("profileDetails").value = data.Overall_Details;
        }
        
        if (data.Profile_Pic) {
    profileImage.src = data.Profile_Pic;
} else {
    profileImage.src = "https://via.placeholder.com/100"; // default DP
}

    } catch (error) {
        console.error("Error loading profile data:", error);
    }
}
//profle//
document.getElementById("profilePic").addEventListener("change", function () {
    const file = this.files[0];

    if (file) {
        const reader = new FileReader();

        reader.onload = function (e) {
            document.getElementById("profileImage").src = e.target.result;
        };

        reader.readAsDataURL(file);
    }
});
</script>

</body>
</html>
